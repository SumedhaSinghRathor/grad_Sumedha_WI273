<div *ngIf="student">
    <p><span>Registration No:</span> {{student.regNo}}</p>
    <p><span>Roll No:</span> {{student.rollNo}}</p>
    <p><span>Name:</span> {{student.name}}</p>
    <p><span>Gender:</span> {{student.gender}}</p>
    <p><span>Percentage:</span> {{student.percentage}}</p>
    <p><span>Standard:</span> {{student.standard}}</p>
    <p><span>School:</span> {{student.school}}</p>
</div>
